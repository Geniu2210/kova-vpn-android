name: Build KOVA VPN APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: '0'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        log-accepted-android-sdk-licenses: false
        packages: 'platforms;android-36 build-tools;35.0.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          --channel=0 \
          --install "ndk;28.2.13676358"
        echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
        sed -i '/^android {/a\    ndkVersion = "28.2.13676358"' \
          ${{ github.workspace }}/V2rayNG/app/build.gradle.kts

    - name: Build libhevtun
      run: |
        git clone --depth=1 --recursive \
          https://github.com/heiher/hev-socks5-tunnel \
          ${{ github.workspace }}/hev-socks5-tunnel
        NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358 \
          bash ${{ github.workspace }}/compile-hevtun.sh
        cp -r ${{ github.workspace }}/libs \
              ${{ github.workspace }}/V2rayNG/app/libs

    - name: Get latest libv2ray tag
      run: |
        TAG=$(curl -s https://api.github.com/repos/2dust/AndroidLibXrayLite/releases/latest \
          | grep '"tag_name"' | cut -d'"' -f4)
        echo "XRAY_TAG=$TAG" >> $GITHUB_ENV
        echo "Latest libv2ray tag: $TAG"

    - name: Download libv2ray.aar
      uses: robinraju/release-downloader@v1.12
      with:
        repository: '2dust/AndroidLibXrayLite'
        tag: ${{ env.XRAY_TAG }}
        fileName: 'libv2ray.aar'
        out-file-path: V2rayNG/app/libs/

    - name: Verify libv2ray.aar
      run: |
        ls -lh ${{ github.workspace }}/V2rayNG/app/libs/
        file ${{ github.workspace }}/V2rayNG/app/libs/libv2ray.aar

    - name: Build Debug APK
      run: |
        cd ${{ github.workspace }}/V2rayNG
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod 755 gradlew
        ./gradlew assemblePlaystoreDebug --no-daemon --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: ${{ success() }}
      with:
        name: KOVA-VPN-debug
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/playstore/debug/*.apk
        retention-days: 30
